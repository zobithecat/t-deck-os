; T-Deck OS — PlatformIO config
;
; Board definition (boards/T-Deck.json) and the entire lib/ tree are vendored
; from LilyGO's official T-Deck repo, so TFT_eSPI / lvgl / SensorsLib come
; pre-configured for this exact hardware. We only add a few build flags.

[platformio]
boards_dir = boards
default_envs = T-Deck
src_dir = src

[env:T-Deck]
platform = espressif32@6.3.0
board = T-Deck
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default

build_flags =
    -DBOARD_HAS_PSRAM=1
    ; Serial over native USB (prints during boot)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DDISABLE_ALL_LIBRARY_WARNINGS
    ; generated font .c uses "lvgl.h" (resolvable) instead of "lvgl/lvgl.h"
    -DLV_LVGL_H_INCLUDE_SIMPLE

lib_deps =
    jgromes/RadioLib@^6.6.0
